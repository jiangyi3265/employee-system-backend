name: Deploy Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-backend
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy backend
    runs-on: ubuntu-latest
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_PORT: ${{ secrets.SSH_PORT }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_PORT: ${{ secrets.SERVER_PORT }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
      BACKEND_DEPLOY_DIR: ${{ secrets.BACKEND_DEPLOY_DIR }}
      BACKEND_JAVA_OPTS: ${{ secrets.BACKEND_JAVA_OPTS }}
      BACKEND_PORT: ${{ secrets.BACKEND_PORT }}
      BACKEND_UPLOAD_DIR: ${{ secrets.BACKEND_UPLOAD_DIR }}
      BACKEND_RESTART_COMMAND: ${{ secrets.BACKEND_RESTART_COMMAND }}
      BACKEND_HEALTHCHECK_URL: ${{ secrets.BACKEND_HEALTHCHECK_URL }}
      DB_USERNAME: ${{ secrets.DB_USERNAME }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'
          cache: maven

      - name: Build jar
        run: mvn -B clean package -DskipTests

      - name: Deploy backend
        shell: bash
        run: |
          set -euo pipefail
          SSH_HOST="${SSH_HOST:-${SERVER_HOST:-}}"
          SSH_PORT="${SSH_PORT:-${SERVER_PORT:-22}}"
          SSH_USER="${SSH_USER:-${SERVER_USER:-}}"
          SSH_PASSWORD="${SSH_PASSWORD:-${SERVER_PASSWORD:-}}"
          DEPLOY_DIR="${BACKEND_DEPLOY_DIR:-/www/wwwroot/gljava}"
          RELEASE_JAR="ruoyi-admin-${GITHUB_SHA}.jar"
          SSH_TARGET="${SSH_USER}@${SSH_HOST}"

          : "${SSH_HOST:?Missing secret SSH_HOST}"
          : "${SSH_USER:?Missing secret SSH_USER}"

          SSH_COMMON=(-p "$SSH_PORT" -o StrictHostKeyChecking=accept-new -o ServerAliveInterval=20 -o ServerAliveCountMax=3)
          SCP_COMMON=(-P "$SSH_PORT" -o StrictHostKeyChecking=accept-new -o ServerAliveInterval=20 -o ServerAliveCountMax=3)

          if [ -n "${SSH_PRIVATE_KEY:-}" ]; then
            mkdir -p ~/.ssh
            chmod 700 ~/.ssh
            printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
            chmod 600 ~/.ssh/deploy_key
            SSH_CMD=(ssh -i ~/.ssh/deploy_key "${SSH_COMMON[@]}")
            SCP_CMD=(scp -i ~/.ssh/deploy_key "${SCP_COMMON[@]}")
          else
            : "${SSH_PASSWORD:?Missing secret SSH_PRIVATE_KEY or SSH_PASSWORD}"
            sudo apt-get update
            sudo apt-get install -y sshpass
            export SSHPASS="$SSH_PASSWORD"
            SSH_CMD=(sshpass -e ssh "${SSH_COMMON[@]}")
            SCP_CMD=(sshpass -e scp "${SCP_COMMON[@]}")
          fi

          "${SSH_CMD[@]}" "$SSH_TARGET" 'bash -s' -- "$DEPLOY_DIR" <<'EOF'
          set -euo pipefail
          DEPLOY_DIR="$1"
          mkdir -p "$DEPLOY_DIR/releases" "$DEPLOY_DIR/logs"
          EOF

          "${SCP_CMD[@]}" ruoyi-admin/target/ruoyi-admin.jar "$SSH_TARGET:$DEPLOY_DIR/releases/$RELEASE_JAR"

          "${SSH_CMD[@]}" "$SSH_TARGET" 'bash -s' -- \
            "$DEPLOY_DIR" \
            "$RELEASE_JAR" \
            "${BACKEND_RESTART_COMMAND:-}" \
            "${BACKEND_JAVA_OPTS:-}" \
            "${BACKEND_PORT:-9090}" \
            "${BACKEND_UPLOAD_DIR:-/www/wwwroot/uploadPath}" \
            "${DB_USERNAME:-}" \
            "${DB_PASSWORD:-}" <<'EOF'
          set -euo pipefail
          DEPLOY_DIR="$1"
          RELEASE_JAR="$2"
          RESTART_COMMAND="$3"
          JAVA_OPTS="$4"
          APP_PORT="$5"
          UPLOAD_DIR="$6"
          DB_USERNAME="$7"
          DB_PASSWORD="$8"

          ln -sfn "$DEPLOY_DIR/releases/$RELEASE_JAR" "$DEPLOY_DIR/ruoyi-admin.jar"
          mkdir -p "$UPLOAD_DIR"

          if [ -n "$RESTART_COMMAND" ]; then
            bash -lc "$RESTART_COMMAND"
          else
            if [ -f "$DEPLOY_DIR/app.pid" ]; then
              OLD_PID="$(cat "$DEPLOY_DIR/app.pid" || true)"
              if [ -n "$OLD_PID" ] && kill -0 "$OLD_PID" 2>/dev/null; then
                kill "$OLD_PID"
                for _ in $(seq 1 20); do
                  kill -0 "$OLD_PID" 2>/dev/null || break
                  sleep 1
                done
              fi
            fi

            APP_ARGS=("--server.port=$APP_PORT" "--ruoyi.profile=$UPLOAD_DIR")
            if [ -n "$DB_USERNAME" ]; then
              APP_ARGS+=("--spring.datasource.druid.master.username=$DB_USERNAME")
            fi
            if [ -n "$DB_PASSWORD" ]; then
              APP_ARGS+=("--spring.datasource.druid.master.password=$DB_PASSWORD")
            fi

            nohup java $JAVA_OPTS -jar "$DEPLOY_DIR/ruoyi-admin.jar" "${APP_ARGS[@]}" > "$DEPLOY_DIR/logs/app.log" 2>&1 &
            echo $! > "$DEPLOY_DIR/app.pid"
          fi

          ls -lh "$DEPLOY_DIR/ruoyi-admin.jar"
          EOF

      - name: Health check
        if: ${{ env.BACKEND_HEALTHCHECK_URL != '' }}
        shell: bash
        run: |
          set -euo pipefail
          for _ in $(seq 1 30); do
            if curl -fsS "$BACKEND_HEALTHCHECK_URL" >/dev/null; then
              echo "Backend health check passed."
              exit 0
            fi
            sleep 2
          done

          echo "Backend health check failed: $BACKEND_HEALTHCHECK_URL"
          exit 1
