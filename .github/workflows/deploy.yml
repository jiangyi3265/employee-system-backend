name: Deploy backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: true

env:
  APP_DIR: /www/wwwroot/gljava
  APP_NAME: ruoyi-admin
  APP_PORT: 9090
  UPLOAD_DIR: /www/wwwroot/uploadPath

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'
          cache: maven

      - name: Build backend jar
        run: mvn -B -DskipTests clean package

      - name: Verify jar
        run: test -f "ruoyi-admin/target/${APP_NAME}.jar"

      - name: Install SSH tools
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Upload jar
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
          SERVER_PORT: ${{ secrets.SERVER_PORT || '22' }}
        run: |
          set -euo pipefail
          : "${SERVER_HOST:?SERVER_HOST secret is required}"
          : "${SERVER_USER:?SERVER_USER secret is required}"
          : "${SERVER_PASSWORD:?SERVER_PASSWORD secret is required}"

          export SSHPASS="$SERVER_PASSWORD"
          sshpass -e scp \
            -o StrictHostKeyChecking=accept-new \
            -o ServerAliveInterval=20 \
            -o ServerAliveCountMax=3 \
            -P "${SERVER_PORT:-22}" \
            "ruoyi-admin/target/${APP_NAME}.jar" \
            "$SERVER_USER@$SERVER_HOST:/tmp/${APP_NAME}.jar"

      - name: Publish backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          command_timeout: 10m
          script_stop: true
          script: |
            set -e

            APP_DIR="${{ env.APP_DIR }}"
            APP_NAME="${{ env.APP_NAME }}"
            APP_PORT="${{ env.APP_PORT }}"
            UPLOAD_DIR="${{ env.UPLOAD_DIR }}"
            DB_USERNAME="${{ secrets.DB_USERNAME }}"
            DB_PASSWORD="${{ secrets.DB_PASSWORD }}"
            APP_JAR="$APP_DIR/$APP_NAME.jar"
            TMP_JAR="/tmp/$APP_NAME.jar"
            BACKUP_DIR="$APP_DIR/backup"
            LOG_DIR="$APP_DIR/logs"
            : "${DB_USERNAME:=ha}"
            : "${DB_PASSWORD:=123456}"

            mkdir -p "$APP_DIR" "$BACKUP_DIR" "$LOG_DIR" "$UPLOAD_DIR"

            if [ ! -f "$TMP_JAR" ]; then
              echo "Uploaded jar not found: $TMP_JAR"
              exit 1
            fi

            if [ -f "$APP_JAR" ]; then
              cp "$APP_JAR" "$BACKUP_DIR/$APP_NAME-$(date +%Y%m%d%H%M%S).jar"
            fi

            cp "$TMP_JAR" "$APP_JAR"
            chmod 755 "$APP_JAR"
            rm -f "$TMP_JAR"

            JAVA_BIN="$(command -v java || true)"
            if [ -z "$JAVA_BIN" ]; then
              if command -v yum >/dev/null 2>&1; then
                yum install -y java-1.8.0-openjdk || yum install -y java-11-openjdk
              elif command -v apt-get >/dev/null 2>&1; then
                apt-get update
                apt-get install -y openjdk-8-jre-headless || apt-get install -y default-jre
              fi
              JAVA_BIN="$(command -v java || true)"
            fi

            if [ -z "$JAVA_BIN" ]; then
              echo "java command not found on server"
              exit 1
            fi

            if command -v systemctl >/dev/null 2>&1; then
              sh_quote() {
                printf "'%s'" "$(printf "%s" "$1" | sed "s/'/'\\\\''/g")"
              }

              START_SCRIPT="$APP_DIR/start-$APP_NAME.sh"
              cat >"$START_SCRIPT" <<EOF
            #!/bin/sh
            exec $(sh_quote "$JAVA_BIN") -jar $(sh_quote "$APP_JAR") \\
              --server.port=$(sh_quote "$APP_PORT") \\
              --ruoyi.profile=$(sh_quote "$UPLOAD_DIR") \\
              --spring.datasource.druid.master.username=$(sh_quote "$DB_USERNAME") \\
              --spring.datasource.druid.master.password=$(sh_quote "$DB_PASSWORD") \\
              >> $(sh_quote "$LOG_DIR/$APP_NAME.log") \\
              2>> $(sh_quote "$LOG_DIR/$APP_NAME.err.log")
            EOF
              chmod 755 "$START_SCRIPT"

              cat >/etc/systemd/system/$APP_NAME.service <<EOF
            [Unit]
            Description=RuoYi backend service
            After=network.target

            [Service]
            Type=simple
            WorkingDirectory=$APP_DIR
            ExecStart=/bin/sh $START_SCRIPT
            Restart=always
            RestartSec=5
            SuccessExitStatus=143

            [Install]
            WantedBy=multi-user.target
            EOF

              systemctl daemon-reload
              systemctl enable "$APP_NAME"
              systemctl restart "$APP_NAME"
              systemctl --no-pager --full status "$APP_NAME"
            else
              pkill -f "$APP_NAME.jar" || true
              nohup "$JAVA_BIN" -jar "$APP_JAR" \
                --server.port="$APP_PORT" \
                --ruoyi.profile="$UPLOAD_DIR" \
                --spring.datasource.druid.master.username="$DB_USERNAME" \
                --spring.datasource.druid.master.password="$DB_PASSWORD" \
                > "$LOG_DIR/$APP_NAME.log" \
                2> "$LOG_DIR/$APP_NAME.err.log" &
              sleep 5
              pgrep -f "$APP_NAME.jar"
            fi
