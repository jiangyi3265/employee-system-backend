name: Deploy backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: true

env:
  APP_DIR: /www/wwwroot/gljava
  APP_NAME: ruoyi-admin
  APP_PORT: 9090

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package source
        run: git archive --format=tar.gz --output="/tmp/$APP_NAME-src.tar.gz" HEAD

      - name: Install SSH tools
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Upload source
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
          SERVER_PORT: ${{ secrets.SERVER_PORT || '22' }}
        run: |
          set -euo pipefail

          export SSHPASS="$SERVER_PASSWORD"
          sshpass -e scp \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -P "${SERVER_PORT:-22}" \
            "/tmp/$APP_NAME-src.tar.gz" \
            "$SERVER_USER@$SERVER_HOST:/tmp/$APP_NAME-src.tar.gz"

      - name: Build and restart backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          command_timeout: 20m
          script_stop: true
          script: |
            set -e

            APP_DIR="${{ env.APP_DIR }}"
            APP_NAME="${{ env.APP_NAME }}"
            APP_PORT="${{ env.APP_PORT }}"
            DB_USERNAME="${{ secrets.DB_USERNAME }}"
            DB_PASSWORD="${{ secrets.DB_PASSWORD }}"
            APP_JAR="$APP_DIR/$APP_NAME.jar"
            SRC_TGZ="/tmp/$APP_NAME-src.tar.gz"
            BUILD_DIR="$APP_DIR/source"
            BUILD_NEW="$APP_DIR/source.new"
            BUILD_PREV="$APP_DIR/source.prev"
            BACKUP_DIR="$APP_DIR/backup"
            LOG_DIR="$APP_DIR/logs"
            UPLOAD_DIR="/www/wwwroot/uploadPath"
            : "${DB_USERNAME:=ha}"
            : "${DB_PASSWORD:=123456}"

            mkdir -p "$APP_DIR" "$BACKUP_DIR" "$LOG_DIR" "$UPLOAD_DIR"

            if [ ! -f "$SRC_TGZ" ]; then
              echo "Uploaded source package not found: $SRC_TGZ"
              exit 1
            fi

            for path in "$BUILD_NEW" "$BUILD_PREV"; do
              case "$path" in
                "$APP_DIR"/*) rm -rf "$path" ;;
                *) echo "Refusing to delete unexpected path: $path"; exit 1 ;;
              esac
            done

            mkdir -p "$BUILD_NEW"
            tar -xzf "$SRC_TGZ" -C "$BUILD_NEW"

            if ! command -v mvn >/dev/null 2>&1; then
              yum install -y maven
            fi

            cd "$BUILD_NEW"
            mvn -B -DskipTests clean package

            NEW_JAR="$BUILD_NEW/ruoyi-admin/target/ruoyi-admin.jar"
            if [ ! -f "$NEW_JAR" ]; then
              echo "Built jar not found: $NEW_JAR"
              exit 1
            fi

            if [ -f "$APP_JAR" ]; then
              cp "$APP_JAR" "$BACKUP_DIR/$APP_NAME-$(date +%Y%m%d%H%M%S).jar"
            fi

            cp "$NEW_JAR" "$APP_JAR"
            chmod 755 "$APP_JAR"
            rm -f "$SRC_TGZ" "/tmp/$APP_NAME.jar"

            if [ -d "$BUILD_DIR" ]; then
              mv "$BUILD_DIR" "$BUILD_PREV"
            fi
            mv "$BUILD_NEW" "$BUILD_DIR"

            if command -v systemctl >/dev/null 2>&1; then
              JAVA_BIN="$(command -v java || true)"
              if [ -z "$JAVA_BIN" ]; then
                echo "java command not found on server"
                exit 1
              fi

              cat >/etc/systemd/system/$APP_NAME.service <<EOF
            [Unit]
            Description=RuoYi backend service
            After=network.target

            [Service]
            Type=simple
            WorkingDirectory=$APP_DIR
            ExecStart=/bin/sh -lc 'exec $JAVA_BIN -jar $APP_JAR --server.port=$APP_PORT --ruoyi.profile=$UPLOAD_DIR --spring.datasource.druid.master.username=$DB_USERNAME --spring.datasource.druid.master.password=$DB_PASSWORD >> $LOG_DIR/$APP_NAME.log 2>> $LOG_DIR/$APP_NAME.err.log'
            Restart=always
            RestartSec=5
            SuccessExitStatus=143

            [Install]
            WantedBy=multi-user.target
            EOF

              systemctl daemon-reload
              systemctl enable "$APP_NAME"
              systemctl restart "$APP_NAME"
              systemctl --no-pager --full status "$APP_NAME"
            else
              pkill -f "$APP_NAME.jar" || true
              nohup java -jar "$APP_JAR" > "$LOG_DIR/$APP_NAME.log" 2> "$LOG_DIR/$APP_NAME.err.log" &
              sleep 5
              pgrep -f "$APP_NAME.jar"
            fi
