name: Deploy Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-backend
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy backend
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_PORT: ${{ secrets.SSH_PORT }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_PORT: ${{ secrets.SERVER_PORT }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
      BACKEND_DEPLOY_DIR: ${{ secrets.BACKEND_DEPLOY_DIR }}
      BACKEND_JAVA_OPTS: ${{ secrets.BACKEND_JAVA_OPTS }}
      BACKEND_PORT: ${{ secrets.BACKEND_PORT }}
      BACKEND_UPLOAD_DIR: ${{ secrets.BACKEND_UPLOAD_DIR }}
      BACKEND_RESTART_COMMAND: ${{ secrets.BACKEND_RESTART_COMMAND }}
      BACKEND_HEALTHCHECK_URL: ${{ secrets.BACKEND_HEALTHCHECK_URL }}
      DB_USERNAME: ${{ secrets.DB_USERNAME }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      WECHAT_APP_ID: ${{ secrets.WECHAT_APP_ID }}
      WECHAT_APP_SECRET: ${{ secrets.WECHAT_APP_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'
          cache: maven

      - name: Build jar
        run: mvn -B clean package -DskipTests

      - name: Deploy backend
        shell: bash
        run: |
          set -euo pipefail
          SSH_HOST="${SSH_HOST:-${SERVER_HOST:-}}"
          SSH_PORT="${SSH_PORT:-${SERVER_PORT:-22}}"
          SSH_USER="${SSH_USER:-${SERVER_USER:-}}"
          SSH_PASSWORD="${SSH_PASSWORD:-${SERVER_PASSWORD:-}}"
          DEPLOY_DIR="${BACKEND_DEPLOY_DIR:-/www/wwwroot/gljava}"
          RELEASE_JAR="ruoyi-admin-${GITHUB_SHA}.jar"
          SSH_TARGET="${SSH_USER}@${SSH_HOST}"
          REUSE_EXISTING_JAR=0
          CLASS_PATCH=0
          PATCH_CLASS_ROOT="ruoyi-admin/target/classes"
          PATCH_CLASS_REL_DIR="com/ruoyi/web/controller/sqms"
          PATCH_CLASS_ENTRY_DIR="BOOT-INF/classes/$PATCH_CLASS_REL_DIR"
          PATCH_DIR="$DEPLOY_DIR/patches/$GITHUB_SHA"
          PATCH_ARCHIVE="$(mktemp)"
          CHANGED_FILES="$(git diff-tree --no-commit-id --name-only -r "$GITHUB_SHA" || true)"
          if [ -n "$CHANGED_FILES" ] && ! printf '%s\n' "$CHANGED_FILES" | grep -vE '^(\.github/workflows/deploy\.yml|ruoyi-admin/src/main/java/com/ruoyi/web/controller/sqms/SqmsRecordController\.java|ruoyi-admin/src/main/resources/application\.yml)$' >/dev/null; then
            REUSE_EXISTING_JAR=1
          fi
          PATCH_CLASS_FILES=("$PATCH_CLASS_ROOT/$PATCH_CLASS_REL_DIR"/SqmsRecordController*.class)
          if [ "$REUSE_EXISTING_JAR" = "1" ] && [ -f "${PATCH_CLASS_FILES[0]}" ]; then
            CLASS_PATCH=1
          fi

          : "${SSH_HOST:?Missing secret SSH_HOST}"
          : "${SSH_USER:?Missing secret SSH_USER}"

          SSH_COMMON=(-p "$SSH_PORT" -o StrictHostKeyChecking=accept-new -o ServerAliveInterval=20 -o ServerAliveCountMax=3)
          SCP_COMMON=(-O -C -P "$SSH_PORT" -o StrictHostKeyChecking=accept-new -o ServerAliveInterval=20 -o ServerAliveCountMax=3)

          if [ -n "${SSH_PRIVATE_KEY:-}" ]; then
            mkdir -p ~/.ssh
            chmod 700 ~/.ssh
            printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
            chmod 600 ~/.ssh/deploy_key
            SSH_CMD=(ssh -i ~/.ssh/deploy_key "${SSH_COMMON[@]}")
            SCP_CMD=(scp -i ~/.ssh/deploy_key "${SCP_COMMON[@]}")
          else
            : "${SSH_PASSWORD:?Missing secret SSH_PRIVATE_KEY or SSH_PASSWORD}"
            sudo apt-get update
            sudo apt-get install -y sshpass
            export SSHPASS="$SSH_PASSWORD"
            SSH_CMD=(sshpass -e ssh "${SSH_COMMON[@]}")
            SCP_CMD=(sshpass -e scp "${SCP_COMMON[@]}")
          fi

          "${SSH_CMD[@]}" "$SSH_TARGET" 'bash -s' -- "$DEPLOY_DIR" <<'EOF'
          set -euo pipefail
          DEPLOY_DIR="$1"
          mkdir -p "$DEPLOY_DIR/releases" "$DEPLOY_DIR/logs"
          EOF

          if [ "$CLASS_PATCH" = "1" ]; then
            echo "Only patchable backend files changed; patching backend classes into existing server jar."
            tar -C "$PATCH_CLASS_ROOT" -czf "$PATCH_ARCHIVE" "$PATCH_CLASS_REL_DIR"/SqmsRecordController*.class
            PATCH_ARCHIVE_TARGET="$(printf '%q' "$PATCH_DIR/controller-classes.tar.gz")"
            "${SSH_CMD[@]}" "$SSH_TARGET" 'bash -s' -- "$PATCH_DIR" <<'EOF'
          set -euo pipefail
          PATCH_DIR="$1"
          mkdir -p "$PATCH_DIR/BOOT-INF/classes"
          EOF
            timeout 120 "${SSH_CMD[@]}" "$SSH_TARGET" "cat > $PATCH_ARCHIVE_TARGET" < "$PATCH_ARCHIVE"
            "${SSH_CMD[@]}" "$SSH_TARGET" 'bash -s' -- "$PATCH_DIR" <<'EOF'
          set -euo pipefail
          PATCH_DIR="$1"
          tar -C "$PATCH_DIR/BOOT-INF/classes" -xzf "$PATCH_DIR/controller-classes.tar.gz"
          find "$PATCH_DIR/BOOT-INF/classes/com/ruoyi/web/controller/sqms" -name 'SqmsRecordController*.class' -type f
          EOF
          elif [ "$REUSE_EXISTING_JAR" = "1" ]; then
            echo "Only deployment workflow changed; reusing existing backend artifact on server."
          else
            gzip -1 -c ruoyi-admin/target/ruoyi-admin.jar > ruoyi-admin.jar.gz
            CHUNK_DIR="$(mktemp -d)"
            split -b 2m ruoyi-admin.jar.gz "$CHUNK_DIR/part-"
            CHUNKS=("$CHUNK_DIR"/part-*)
            TOTAL_CHUNKS="${#CHUNKS[@]}"
            UPLOAD_TARGET="$(printf '%q' "$DEPLOY_DIR/releases/$RELEASE_JAR.gz")"
            "${SSH_CMD[@]}" "$SSH_TARGET" "cat /dev/null > $UPLOAD_TARGET"
            CHUNK_INDEX=0
            for chunk in "${CHUNKS[@]}"; do
              CHUNK_INDEX=$((CHUNK_INDEX + 1))
              echo "Uploading backend artifact chunk $CHUNK_INDEX/$TOTAL_CHUNKS"
              timeout 300 "${SSH_CMD[@]}" "$SSH_TARGET" "cat >> $UPLOAD_TARGET" < "$chunk"
            done
          fi

          RESTART_COMMAND_ARG="${BACKEND_RESTART_COMMAND:-__EMPTY__}"
          JAVA_OPTS_ARG="${BACKEND_JAVA_OPTS:-__EMPTY__}"
          DB_USERNAME_ARG="${DB_USERNAME:-__EMPTY__}"
          DB_PASSWORD_ARG="${DB_PASSWORD:-__EMPTY__}"
          WECHAT_APP_ID_ARG="${WECHAT_APP_ID:-__EMPTY__}"
          WECHAT_APP_SECRET_ARG="${WECHAT_APP_SECRET:-__EMPTY__}"

          "${SSH_CMD[@]}" "$SSH_TARGET" 'bash -s' -- \
            "$DEPLOY_DIR" \
            "$RELEASE_JAR" \
            "${BACKEND_PORT:-9090}" \
            "${BACKEND_UPLOAD_DIR:-/www/wwwroot/uploadPath}" \
            "$DB_USERNAME_ARG" \
            "$DB_PASSWORD_ARG" \
            "$JAVA_OPTS_ARG" \
            "$RESTART_COMMAND_ARG" \
            "$WECHAT_APP_ID_ARG" \
            "$WECHAT_APP_SECRET_ARG" \
            "$REUSE_EXISTING_JAR" \
            "$CLASS_PATCH" \
            "$PATCH_DIR" \
            "$PATCH_CLASS_ENTRY_DIR" <<'EOF'
          set -euo pipefail
          DEPLOY_DIR="${1:-}"
          RELEASE_JAR="${2:-}"
          APP_PORT="${3:-9090}"
          UPLOAD_DIR="${4:-/www/wwwroot/uploadPath}"
          DB_USERNAME="${5:-__EMPTY__}"
          DB_PASSWORD="${6:-__EMPTY__}"
          JAVA_OPTS="${7:-__EMPTY__}"
          RESTART_COMMAND="${8:-__EMPTY__}"
          WECHAT_APP_ID="${9:-__EMPTY__}"
          WECHAT_APP_SECRET="${10:-__EMPTY__}"
          REUSE_EXISTING_JAR="${11:-0}"
          CLASS_PATCH="${12:-0}"
          PATCH_DIR="${13:-}"
          PATCH_CLASS_ENTRY_DIR="${14:-}"

          [ "$DB_USERNAME" = "__EMPTY__" ] && DB_USERNAME=""
          [ "$DB_PASSWORD" = "__EMPTY__" ] && DB_PASSWORD=""
          [ "$JAVA_OPTS" = "__EMPTY__" ] && JAVA_OPTS=""
          [ "$RESTART_COMMAND" = "__EMPTY__" ] && RESTART_COMMAND=""
          [ "$WECHAT_APP_ID" = "__EMPTY__" ] && WECHAT_APP_ID=""
          [ "$WECHAT_APP_SECRET" = "__EMPTY__" ] && WECHAT_APP_SECRET=""

          if [ "$CLASS_PATCH" = "1" ]; then
            CURRENT_JAR_PATH="$(readlink -f "$DEPLOY_DIR/ruoyi-admin.jar" || true)"
            if [ -z "$CURRENT_JAR_PATH" ] || [ ! -f "$CURRENT_JAR_PATH" ]; then
              echo "No existing backend artifact found on server."
              exit 1
            fi
            cp "$CURRENT_JAR_PATH" "$DEPLOY_DIR/releases/$RELEASE_JAR"
            if command -v python3 >/dev/null 2>&1; then
              python3 - "$DEPLOY_DIR/releases/$RELEASE_JAR" "$PATCH_DIR" "$PATCH_CLASS_ENTRY_DIR" <<'PY'
          import os
          import sys
          import zipfile

          jar_path, patch_dir, class_entry_dir = sys.argv[1:]
          tmp_path = jar_path + ".tmp"
          patch_base = os.path.join(patch_dir, class_entry_dir)
          patch_files = []
          for root, _, files in os.walk(patch_base):
              for name in files:
                  if not name.endswith(".class"):
                      continue
                  path = os.path.join(root, name)
                  entry = os.path.relpath(path, patch_dir).replace(os.sep, "/")
                  patch_files.append((entry, path))
          if not patch_files:
              raise SystemExit("No patch class files found")
          patch_entries = {entry for entry, _ in patch_files}
          seen = set()
          with zipfile.ZipFile(jar_path, "r") as zin, zipfile.ZipFile(tmp_path, "w", zipfile.ZIP_DEFLATED) as zout:
              for item in zin.infolist():
                  if item.filename in patch_entries or item.filename in seen:
                      continue
                  seen.add(item.filename)
                  zout.writestr(item, zin.read(item.filename))
              for entry, path in patch_files:
                  with open(path, "rb") as f:
                      zout.writestr(entry, f.read())
          os.replace(tmp_path, jar_path)
          PY
            elif command -v jar >/dev/null 2>&1; then
              (cd "$PATCH_DIR" && jar uf "$DEPLOY_DIR/releases/$RELEASE_JAR" "$PATCH_CLASS_ENTRY_DIR"/SqmsRecordController*.class)
            else
              echo "No jar or python3 command found to patch backend artifact."
              exit 1
            fi
            ln -sfn "$DEPLOY_DIR/releases/$RELEASE_JAR" "$DEPLOY_DIR/ruoyi-admin.jar"
          elif [ "$REUSE_EXISTING_JAR" = "1" ]; then
            CURRENT_JAR_PATH="$(readlink -f "$DEPLOY_DIR/ruoyi-admin.jar" || true)"
            if [ -z "$CURRENT_JAR_PATH" ] || [ ! -f "$CURRENT_JAR_PATH" ]; then
              echo "No existing backend artifact found on server."
              exit 1
            fi
            RELEASE_JAR="$(basename "$CURRENT_JAR_PATH")"
          elif [ -f "$DEPLOY_DIR/releases/$RELEASE_JAR.gz" ]; then
            gzip -dc "$DEPLOY_DIR/releases/$RELEASE_JAR.gz" > "$DEPLOY_DIR/releases/$RELEASE_JAR"
            rm -f "$DEPLOY_DIR/releases/$RELEASE_JAR.gz"
            ln -sfn "$DEPLOY_DIR/releases/$RELEASE_JAR" "$DEPLOY_DIR/ruoyi-admin.jar"
          fi

          mkdir -p "$UPLOAD_DIR"

          if [ -n "$RESTART_COMMAND" ]; then
            echo "BACKEND_RESTART_COMMAND is configured, but this workflow uses the built-in restart to guarantee runtime secrets."
          fi

          if [ -f "$DEPLOY_DIR/app.pid" ]; then
            OLD_PID="$(cat "$DEPLOY_DIR/app.pid" || true)"
            if [ -n "$OLD_PID" ]; then
              kill "$OLD_PID" 2>/dev/null || true
              sleep 3
              kill -9 "$OLD_PID" 2>/dev/null || true
            fi
          fi
          command -v fuser >/dev/null 2>&1 && fuser -k -n tcp "$APP_PORT" 2>/dev/null || true
          if command -v lsof >/dev/null 2>&1; then
            lsof -ti tcp:"$APP_PORT" | xargs -r kill -9 2>/dev/null || true
          fi
          pkill -f "$DEPLOY_DIR/ruoyi-admin.jar" 2>/dev/null || true
          pkill -f "$DEPLOY_DIR/releases/ruoyi-admin-.*\\.jar" 2>/dev/null || true
          sleep 2

          APP_ARGS=("--server.port=$APP_PORT" "--ruoyi.profile=$UPLOAD_DIR")
          if [ -n "$DB_USERNAME" ]; then
            APP_ARGS+=("--spring.datasource.druid.master.username=$DB_USERNAME")
          fi
          if [ -n "$DB_PASSWORD" ]; then
            APP_ARGS+=("--spring.datasource.druid.master.password=$DB_PASSWORD")
          fi
          if [ -n "$WECHAT_APP_ID" ]; then
            APP_ARGS+=("--sqms.wechat.app-id=$WECHAT_APP_ID")
          fi
          if [ -n "$WECHAT_APP_SECRET" ]; then
            APP_ARGS+=("--sqms.wechat.app-secret=$WECHAT_APP_SECRET")
          fi

          JAVA_SYSTEM_PROPS=()
          if [ -n "$WECHAT_APP_ID" ]; then
            JAVA_SYSTEM_PROPS+=("-Dsqms.wechat.app-id=$WECHAT_APP_ID" "-DWECHAT_APP_ID=$WECHAT_APP_ID")
          fi
          if [ -n "$WECHAT_APP_SECRET" ]; then
            JAVA_SYSTEM_PROPS+=("-Dsqms.wechat.app-secret=$WECHAT_APP_SECRET" "-DWECHAT_APP_SECRET=$WECHAT_APP_SECRET")
          fi

          export WECHAT_APP_ID
          export WECHAT_APP_SECRET
          nohup java $JAVA_OPTS "${JAVA_SYSTEM_PROPS[@]}" -jar "$DEPLOY_DIR/ruoyi-admin.jar" "${APP_ARGS[@]}" < /dev/null > "$DEPLOY_DIR/logs/app.log" 2>&1 &
          echo $! > "$DEPLOY_DIR/app.pid"

          for _ in $(seq 1 60); do
            NEW_PID="$(cat "$DEPLOY_DIR/app.pid" || true)"
            if [ -z "$NEW_PID" ] || ! kill -0 "$NEW_PID" 2>/dev/null; then
              tail -n 120 "$DEPLOY_DIR/logs/app.log" || true
              exit 1
            fi
            LOGIN_BODY="$(curl -sS -X POST "http://127.0.0.1:$APP_PORT/sqms/auth/login/wechat" -H 'Content-Type: application/json' -d '{"role":"employee","code":"codex-invalid-code"}' || true)"
            BIND_STATUS="$(curl -sS -o /tmp/sqms-bind-check.txt -w '%{http_code}' -X POST "http://127.0.0.1:$APP_PORT/sqms/auth/wechat/bind" -H 'Content-Type: application/json' -d '{"role":"employee","phone":"__codex__","password":"__codex__","code":"codex-invalid-code"}' || true)"
            if printf '%s' "$LOGIN_BODY" | grep -q 'AppID/AppSecret'; then
              echo "Wechat runtime config is missing after restart."
              exit 1
            fi
            if [ "$BIND_STATUS" = "404" ]; then
              echo "Wechat bind endpoint is still missing after restart."
              exit 1
            fi
            if printf '%s' "$LOGIN_BODY" | grep -Eq 'invalid code|invalid js_code'; then
              echo "Backend started with WeChat config and bind endpoint."
              break
            fi
            sleep 2
          done
          if ! printf '%s' "$LOGIN_BODY" | grep -Eq 'invalid code|invalid js_code'; then
            echo "Backend did not pass WeChat runtime check."
            tail -n 120 "$DEPLOY_DIR/logs/app.log" || true
            exit 1
          fi

          ls -lh "$DEPLOY_DIR/ruoyi-admin.jar"
          EOF

      - name: Health check
        if: ${{ env.BACKEND_HEALTHCHECK_URL != '' }}
        shell: bash
        run: |
          set -euo pipefail
          for _ in $(seq 1 30); do
            if curl -fsS "$BACKEND_HEALTHCHECK_URL" >/dev/null; then
              echo "Backend health check passed."
              exit 0
            fi
            sleep 2
          done

          echo "Backend health check failed: $BACKEND_HEALTHCHECK_URL"
          exit 1
