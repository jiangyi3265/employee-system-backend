name: Reset admin password

on:
  workflow_dispatch:

jobs:
  reset:
    runs-on: ubuntu-latest

    steps:
      - name: Reset admin password on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          command_timeout: 5m
          script_stop: true
          script: |
            set -e

            DB_NAME="ha"
            DB_USERNAME="${{ secrets.DB_USERNAME }}"
            DB_PASSWORD="${{ secrets.DB_PASSWORD }}"
            DEFAULT_HASH='$2a$10$7JB720yubVSZvUI0rEqK/.VqGOZTH.ulu33dHOiBE8ByOhJIrdAu2'

            mysql_bin="$(command -v mysql || command -v mariadb || true)"
            if [ -z "$mysql_bin" ]; then
              echo "mysql/mariadb client not found on server"
              exit 1
            fi

            run_sql() {
              user="$1"
              pass="$2"
              MYSQL_PWD="$pass" "$mysql_bin" \
                --protocol=TCP \
                -h 127.0.0.1 \
                -u "$user" \
                "$DB_NAME" \
                --batch \
                --raw \
                --execute "$3"
            }

            SQL="UPDATE sys_user SET password = '$DEFAULT_HASH', status = '0', del_flag = '0', pwd_update_date = NOW(), update_by = 'github-actions', update_time = NOW() WHERE user_name = 'admin'; SELECT CONCAT('admin_rows=', COUNT(*), ', status=', IFNULL(MAX(status), ''), ', del_flag=', IFNULL(MAX(del_flag), '')) FROM sys_user WHERE user_name = 'admin';"

            if run_sql "$DB_USERNAME" "$DB_PASSWORD" "$SQL"; then
              echo "admin password reset with configured database credentials"
            elif run_sql "root" "123456" "$SQL"; then
              echo "admin password reset with fallback root credentials"
            elif run_sql "ha" "123456" "$SQL"; then
              echo "admin password reset with fallback ha credentials"
            else
              echo "failed to reset admin password with known database credentials"
              exit 1
            fi

            if command -v redis-cli >/dev/null 2>&1; then
              redis-cli -n 0 DEL "pwd_err_cnt:admin" >/dev/null 2>&1 || true
              echo "admin password retry cache cleared"
            else
              echo "redis-cli not found; skip retry cache clear"
            fi
